<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>Sign In · Stratum Customs</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='75' font-size='75' text-anchor='middle'%3E👟%3C/text%3E%3C/svg%3E">
    <!-- Tailwind CSS -->
    <script src="tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'stratum': '#853953',
                        'stratum-dark': '#5E2A3C',
                        'stratum-light': '#A54A6A',
                        'stratum-glow': '#C06080',
                        'canvas-light': '#F3F4F4',
                        'canvas-dark': '#0F0F0F',
                        'canvas-charcoal': '#1A1A1A',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                        'display': ['Syne', 'sans-serif'],
                        'mono': ['Space Mono', 'monospace'],
                    },
                    backgroundImage: {
                        'stratum-gradient': "linear-gradient(135deg, #853953 0%, #5E2A3C 100%)",
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.2s ease-out',
                        'float': 'float 6s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ----- NO SCROLL — fit exactly one screen ----- */
        html,
        body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #F3F4F4;
            color: #1A1A1A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .dark body {
            background-color: #0F0F0F;
            color: #FFFFFF;
        }

        /* toggle buttons — positioned top-right */
        .theme-toggle-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 8px;
        }

        .toggle-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #FFFFFF;
            color: #853953;
            transition: all 0.2s ease;
            border: 1px solid #85395320;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .dark .toggle-btn {
            background: #1A1A1A;
            color: #853953;
            border-color: #85395340;
        }

        .toggle-btn:hover {
            background: #853953;
            color: white;
        }

        .dark .toggle-btn:hover {
            background: #853953;
            color: white;
        }

        .toggle-btn.active {
            background: #853953;
            color: white;
        }

        /* LOGIN CARD — stratum theme */
        .login-card {
            background: white;
            border-radius: 36px;
            padding: 2.2rem 2rem 2rem;
            box-shadow: 0 20px 45px rgba(133, 57, 83, 0.12);
            border: 1px solid rgba(133, 57, 83, 0.2);
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
        }

        .dark .login-card {
            background: #1A1A1A;
            border-color: #85395340;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* input — stratum style */
        .login-input {
            width: 100%;
            padding: 0.85rem 1.2rem 0.85rem 3rem;
            border-radius: 50px;
            border: 1px solid #E5E5E5;
            background: white;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #1A1A1A;
        }

        .dark .login-input {
            background: #0F0F0F;
            border-color: #2A2A2A;
            color: #FFFFFF;
        }

        .login-input:focus {
            outline: none;
            border-color: #853953;
            box-shadow: 0 0 0 3px rgba(133, 57, 83, 0.2);
        }

        .dark .login-input:focus {
            border-color: #853953;
            box-shadow: 0 0 0 3px rgba(133, 57, 83, 0.25);
        }

        /* password wrapper for eye icon */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper .login-input {
            padding-right: 3rem;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #853953;
            font-size: 1rem;
            transition: color 0.2s;
            background: transparent;
            border: none;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dark .toggle-password {
            color: #853953;
        }

        .toggle-password:hover {
            color: #5E2A3C;
        }

        .dark .toggle-password:hover {
            color: #A54A6A;
        }

        [dir="rtl"] .toggle-password {
            right: auto;
            left: 1rem;
        }

        [dir="rtl"] .password-wrapper .login-input {
            padding-right: 1.2rem;
            padding-left: 3rem;
        }

        [dir="rtl"] .input-icon {
            left: auto;
            right: 1.1rem;
        }

        /* stratum button */
        .stratum-btn {
            background: #853953;
            color: white;
            font-weight: 600;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            font-size: 1rem;
            border: none;
            cursor: pointer;
        }

        .dark .stratum-btn {
            background: #853953;
            color: white;
        }

        .stratum-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(133, 57, 83, 0.35);
            background: #5E2A3C;
        }

        /* social login buttons */
        .social-btn-row {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .social-btn {
            flex: 1;
            padding: 0.8rem 0.5rem;
            border-radius: 50px;
            border: 1px solid #E5E5E5;
            background: white;
            color: #1A1A1A;
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            gap: 0.5rem;
            white-space: nowrap;
            cursor: pointer;
        }

        .dark .social-btn {
            background: #0F0F0F;
            border-color: #2A2A2A;
            color: #FFFFFF;
        }

        .social-btn:hover {
            background: #F3F4F4;
            border-color: #853953;
            transform: translateY(-2px);
        }

        .dark .social-btn:hover {
            background: #1A1A1A;
            border-color: #853953;
        }

        .social-btn i {
            font-size: 1.1rem;
            color: #853953;
        }

        .dark .social-btn i {
            color: #853953;
        }

        /* logo spin */
        .logo-icon {
            transition: transform 0.3s ease;
        }

        a:hover .logo-icon {
            transform: rotate(12deg);
        }

        /* RTL adjustments */
        [dir="rtl"] .login-input {
            padding: 0.85rem 3rem 0.85rem 1.2rem;
        }

        [dir="rtl"] .input-icon {
            left: auto;
            right: 1.1rem;
        }

        [dir="rtl"] .fa-arrow-right {
            transform: scaleX(-1);
        }

        [dir="rtl"] .theme-toggle-wrapper {
            right: auto;
            left: 20px;
        }

        /* hidden utility */
        .hidden {
            display: none;
        }

        /* container */
        .container-tight {
            max-width: 480px;
            width: 100%;
            padding: 0 1.2rem;
        }

        /* center logo container */
        .logo-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        /* welcome title styles */
        .welcome-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1A1A1A;
            margin-top: 1rem;
            margin-bottom: 0.25rem;
            text-align: center;
            line-height: 1.2;
        }

        .dark .welcome-title {
            color: white;
        }

        .welcome-subtitle {
            font-size: 0.9rem;
            color: rgba(26, 26, 26, 0.6);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .dark .welcome-subtitle {
            color: #9CA3AF;
        }

        /* mobile friendly */
        @media (max-width: 380px) {
            .social-btn-row {
                flex-direction: column;
            }

            .login-card {
                padding: 1.8rem 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .theme-toggle-wrapper {
                top: 12px;
                right: 12px;
            }

            [dir="rtl"] .theme-toggle-wrapper {
                left: 12px;
            }
        }

        /* stratum line */
        .stratum-line {
            width: 50px;
            height: 2px;
            background: #853953;
            margin: 0.5rem auto;
        }
    </style>
</head>

<body class="bg-canvas-light dark:bg-canvas-dark">

    <!-- ===== THEME TOGGLES - TOP-RIGHT ===== -->
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" class="toggle-btn" title="Dark / Light">
            <i class="fas fa-moon"></i>
        </button>
        <button id="rtl-toggle" class="toggle-btn" title="RTL / LTR">
            ⇄
        </button>
    </div>

    <!-- ===== LOGIN CARD ===== -->
    <div class="container-tight">

        <!-- LOGIN CARD -->
        <div class="login-card animate-fade-in">

            <!-- ===== LOGO - CENTERED ===== -->
            <div class="logo-center">
                <a href="index.html" class="flex items-center space-x-3 group">
                    
                    <div class="bg-gray-900 px-5 py-2 rounded-full flex items-center shadow-lg transform group-hover:scale-105 transition-transform">
                        <span class="text-2xl font-display font-bold text-stratum">Prime</span><span class="text-2xl font-display font-bold text-white">Sneaks</span>
                    </div>
                </a>
                <h1 class="welcome-title">Welcome Back</h1>
                <p class="welcome-subtitle">Sign in to explore custom sneaker art</p>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <form class="space-y-5" action="index.html" method="GET">

                <!-- email field -->
                <div class="relative">

                <!-- remember + forgot -->

                    <a href="#"

                        Forgot password?
                    </a>
                </div>

               <form id="loginForm">
    <!-- inputs here -->

    <button type="submit" class="stratum-btn mt-3">
        <i class="fas fa-arrow-right-to-bracket mr-2 rtl:ml-2 rtl:mr-0"></i>
        Sign In
    </button>
</form>



                <!-- divider -->
                <div class="relative my-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                    </div>
                    <div class="relative justify-center flex text-xs">
                        <span
                            class="bg-white dark:bg-[#1A1A1A] px-4 py-0.5 text-gray-500 dark:text-gray-400 rounded-full">
                            or continue with
                        </span>
                    </div>
                </div>

                <!-- ===== "NOT A MEMBER? SIGN UP" LINK ===== -->
                <div class="text-center mt-3 pt-1 border-t border-dashed border-gray-200 dark:border-gray-700/40">
                    <a href="signup.html"
                        class="inline-flex items-center text-stratum dark:text-stratum font-semibold hover:text-stratum-dark transition group text-sm md:text-base gap-2">
                        <i class="fas fa-user-plus"></i>
                        <span>Not a member? Sign up</span>
                        <i

                    </a>

            </form>

            <!-- ===== SOCIAL LOGIN BUTTONS ===== -->
            <div class="mt-6">
                <div class="grid grid-cols-2 gap-3">
                    <button class="social-btn group w-full flex items-center justify-center gap-2 py-3 px-2 text-sm"
                        onclick="window.location.href='#';">
                        <i class="fab fa-google text-base"></i>
                        <span>Google</span>
                    </button>

                    <button class="social-btn group w-full flex items-center justify-center gap-2 py-3 px-2 text-sm"

                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== DARK / LIGHT + RTL TOGGLE SCRIPT + EYE ICON FUNCTIONALITY ===== -->
    <script>
        (function () {
            // ---------- THEME ----------
            const themeToggle = document.getElementById('theme-toggle');

            function setTheme(isDark) {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }

                const icon = themeToggle?.querySelector('i');
                if (icon) {
                    icon.classList.remove('fa-sun', 'fa-moon');
                    icon.classList.add(isDark ? 'fa-moon' : 'fa-sun');
                }

                if (isDark) {
                    themeToggle?.classList.add('active');
                    localStorage.setItem('theme', 'dark');
                } else {
                    themeToggle?.classList.remove('active');
                    localStorage.setItem('theme', 'light');
                }
            }
            
            // Check for saved theme or system preference
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                setTheme(true);
            } else if (savedTheme === 'light') {
                setTheme(false);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                setTheme(true);
            } else {
                setTheme(false);
            }

            if (themeToggle) {
                themeToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    setTheme(!document.documentElement.classList.contains('dark'));
                });
            }

            // ---------- RTL ----------
            const rtlBtn = document.getElementById('rtl-toggle');
            function setRTL(isRTL) {
                if (isRTL) {
                    document.documentElement.dir = 'rtl';
                    document.documentElement.lang = 'ar';
                    rtlBtn?.classList.add('active');
                    localStorage.setItem('dir', 'rtl');
                } else {
                    document.documentElement.dir = 'ltr';
                    document.documentElement.lang = 'en';
                    rtlBtn?.classList.remove('active');
                    localStorage.setItem('dir', 'ltr');
                }
            }
            const savedDir = localStorage.getItem('dir');
            savedDir === 'rtl' ? setRTL(true) : setRTL(false);

            if (rtlBtn) {
                rtlBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    setRTL(document.documentElement.dir !== 'rtl');
                });
            }

            // ---------- EYE ICON TOGGLE PASSWORD VISIBILITY ----------
            const toggleButtons = document.querySelectorAll('.toggle-password');
            toggleButtons.forEach(button => {
                button.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('data-target');
                    const passwordInput = document.getElementById(targetId);
                    if (passwordInput) {
                        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                        passwordInput.setAttribute('type', type);
                        // Toggle eye icon
                        const icon = this.querySelector('i');
                        if (icon) {
                            if (type === 'text') {
                                icon.classList.remove('fa-eye-slash');
                                icon.classList.add('fa-eye');
                            } else {
                                icon.classList.remove('fa-eye');
                                icon.classList.add('fa-eye-slash');
                            }
                        }
                    }
                });
            });

            // forgot password demo
            document.querySelectorAll('a[href="#"]').forEach(link => {
                if (link.textContent.includes('Forgot') || link.innerHTML.includes('Forgot')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('🔐 Password reset link would be sent to your email');
                    });
                }
            });
        })();
    </script>
</body>
